[build]
  publish = "public"

# Serve with Brotli/gzip compression (Netlify enables this automatically,
# but declaring it here ensures it's always on)
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = false
  minify = false
[build.processing.js]
  bundle = false
  minify = false
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true
