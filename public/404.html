            if (savedTheme === 'light') document.documentElement.classList.add('light-theme');

    <style>
        .err-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            position: relative;
            overflow: hidden;
        }
        .err-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(212,167,106,0.05) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .err-content {
            position: relative;
            z-index: 1;
            max-width: 540px;
        }
        .err-code {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(100px, 22vw, 160px);
            font-weight: 300;
            line-height: 1;
            background: linear-gradient(135deg, #d4a76a, rgba(212,167,106,0.35));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 4px;
            letter-spacing: -4px;
        }
        .err-plane {
            font-size: 48px;
            animation: float404 3s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 24px;
        }
        @keyframes float404 {
            0%, 100% { transform: translateY(0px) rotate(-5deg); }
            50%       { transform: translateY(-14px) rotate(5deg); }
        }
        .err-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 400;
            color: var(--white);
            margin: 0 0 12px;
        }
        .err-sub {
            font-size: 15px;
            color: rgba(var(--white-rgb), 0.55);
            line-height: 1.7;
            margin: 0 0 40px;
        }
        .err-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .err-actions a {
            text-decoration: none;
        }
        .err-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(212,167,106,0.10);
            border: 1px solid rgba(212,167,106,0.25);
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .err-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,167,106,0.4), transparent);
            margin: 32px auto;
        }
        .err-tip {
            font-size: 13px;
            color: rgba(var(--white-rgb), 0.35);
        }

    <!-- Microsoft Clarity -->

        <div class="err-badge">Error 404</div>
        <div class="err-plane">✈️</div>

        <h1 class="err-title">Lost in the clouds?</h1>
        <p class="err-sub">
            The page you're looking for doesn't exist or may have been moved.<br>
            Let's get you back on track — your next adventure awaits.
        </p>
        <div class="err-actions">
            <a href="index.html">
                <button class="btn-primary">🏠 Go to Home</button>
            </a>
            <a href="form.html">
                <button class="btn-outline">✨ Plan a Trip</button>
            </a>
            <a href="dashboard.html">
                <button class="btn-outline">📋 Dashboard</button>
            </a>
        </div>
        <div class="err-divider"></div>

            If you think this is a mistake, try going back or check the URL for typos.
