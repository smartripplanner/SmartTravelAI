async function loadPost(slug) {
    // Try Firestore first
    const snap = await getDocs(query(collection(db, 'blogPosts'), where('slug', '==', slug))).catch(() => null);

    if (!post) { showNotFound(); return; }

    // Update meta

    document.getElementById('metaDesc').content = post.excerpt || post.title;

    // Load related posts
    const relatedSnap = await getDocs(
        query(collection(db, 'blogPosts'), where('category', '==', post.category), limit(5))
    ).catch(() => null);
    let related = relatedSnap?.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.slug !== slug).slice(0, 4) || [];
    if (!related.length) related = getSamplePosts().filter(p => p.category === post.category && p.slug !== slug).slice(0, 4);

    renderPost(post, related);
}

window.sharePost = function(platform) {
    const url = window.location.href;
    const title = document.querySelector('.post-title')?.textContent || 'TravelAI Blog';
    if (platform === 'twitter') {

    }
};

function estimateReadTime(text) {
    return Math.max(1, Math.ceil(text.split(' ').length / 200));
}

// Simple markdown-to-HTML converter
function markdownToHtml(md) {
    return md
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .split('\n\n')
        .map(block => {
            if (/^<(h[23]|ul|ol|blockquote|hr)/.test(block.trim())) return block;
            if (!block.trim()) return '';
            return `<p>${block.replace(/\n/g, ' ')}</p>`;
        })
        .join('\n');
}

## The Golden Rules

**1. Lay everything out, then remove half**

Before you close your bag, take out 50% of what you packed. You will not wear most of it.

**2. Roll, don't fold**

Rolling clothes saves up to 30% more space and reduces wrinkles.

**3. One bag rule**

If you can't carry it yourself for 20 minutes, it's too heavy. Use a carry-on only whenever possible.

**4. Wear your heaviest items on the plane**

- A power bank (lifesaver)
- A small padlock for hostel lockers
- Photocopies of your passport and visa

- Universal travel adapter
- 3-in-1 charging cable
